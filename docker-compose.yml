version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # Banco de dados dos metadados internos do Metabase
  # ---------------------------------------------------------------------------
  metabase-db:
    image: postgres:16
    container_name: metabase-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       metabase
      POSTGRES_USER:     metabase
      POSTGRES_PASSWORD: metabase_password
    volumes:
      - metabase_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase -d metabase"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - metabase-network

  ibge-db:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: ibge-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ibge
      POSTGRES_USER:     bigdata
      POSTGRES_PASSWORD: "12345"
    volumes:
      - ibge_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bigdata -d ibge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - metabase-network

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    depends_on:
      metabase-db:
        condition: service_healthy
      ibge-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE:   postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT:   5432
      MB_DB_USER:   metabase
      MB_DB_PASS:   metabase_password
      MB_DB_HOST:   metabase-db

      # configs opcionais
      MB_SITE_URL:    http://localhost:3000
      JAVA_TIMEZONE:  America/Sao_Paulo
      MB_SITE_LOCALE: pt
    networks:
      - metabase-network

volumes:
  metabase_db_data:
  ibge_db_data:

networks:
  metabase-network:
    driver: bridge
